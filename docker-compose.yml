# Раннер-контейнер. Поднимается автоматически при старте Docker (restart unless-stopped),
# живёт в той же сети, что Vexa, поэтому ходит к ней по имени контейнера vexa-lite.
#
# Запуск/обновление:  docker compose up -d --build
# Логи:               docker logs -f tryll-runner
# Остановить:         docker compose down
services:
  runner:
    build: .
    image: tryll-runner
    container_name: tryll-runner
    restart: unless-stopped
    env_file: .env
    environment:
      # внутри docker-сети Vexa доступна по имени контейнера, а не localhost
      VEXA_BASE_URL: http://vexa-lite:8056
      # персистентный стор обработанных митов (переживает рестарт/пересборку),
      # иначе бот возвращается на мит после кика
      STORE_FILE: /data/store.json
    volumes:
      - runner-data:/data
    networks:
      - vexa-network

  # Дашборд-календарь (read-only): смотрит миты всех + статус бота. Изолирован —
  # монтирует стор раннера ТОЛЬКО на чтение (:ro), на ботов/раннер не влияет.
  # Открывать: http://localhost:8090
  dashboard:
    build: ./dashboard
    image: tryll-dashboard
    container_name: tryll-dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      VEXA_BASE_URL: http://vexa-lite:8056
      STORE_FILE: /data/store.json
      DASHBOARD_PORT: 8090
    volumes:
      - runner-data:/data:ro
    ports:
      - "8090:8090"
    networks:
      - vexa-network

volumes:
  runner-data:

networks:
  vexa-network:
    external: true
