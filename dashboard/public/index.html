<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tryll Meet — календарь созвонов</title>
<style>
  :root{
    --bg:#0f0f11; --elev:#17171b; --elev2:#202026;
    --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.12);
    --txt:#e9e9ec; --muted:#9a9aa4; --faint:#65656f;
    --accent:#5b8cff;
    --live:#5b8cff; --done:#33b27e; --failed:#e0555f; --pending:#dda032; --skipped:#7a8296; --none:#585862;
  }
  *{box-sizing:border-box}
  ::selection{background:rgba(91,140,255,.3)}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--txt);
    font:13.5px/1.45 system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  *::-webkit-scrollbar{width:11px;height:11px}
  *::-webkit-scrollbar-thumb{background:rgba(255,255,255,.09);border-radius:20px;border:3px solid transparent;background-clip:content-box}
  *::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.16);background-clip:content-box}
  *::-webkit-scrollbar-track{background:transparent}

  header{display:flex;align-items:center;gap:16px;padding:0 20px;height:52px;position:sticky;top:0;z-index:6;
    background:var(--bg);border-bottom:1px solid var(--line)}
  header h1{font-size:14px;margin:0;font-weight:600;letter-spacing:-.1px;color:var(--txt)}
  .wkrange{font-size:14px;font-weight:600;min-width:210px;color:var(--txt)}
  button{background:var(--elev);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:6px 12px;cursor:pointer;
    font-size:13px;font-weight:500;transition:background .12s,border-color .12s}
  button:hover{background:var(--elev2);border-color:var(--line2)}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  button.primary:hover{background:#4d7ff0;border-color:#4d7ff0}
  .nav{display:flex;gap:6px;align-items:center}
  .nav button{padding:6px 11px;line-height:1}
  .legend{display:flex;gap:14px;margin-left:auto;flex-wrap:wrap;align-items:center}
  .lg{display:flex;gap:6px;align-items:center;font-size:12px;color:var(--muted)}
  .dot{width:8px;height:8px;border-radius:2px;display:inline-block}
  .spin{color:var(--muted);font-size:12px}

  .grid{display:grid;grid-template-columns:52px repeat(7,1fr);height:calc(100vh - 106px);overflow:auto}
  .gutter,.daycol{border-right:1px solid var(--line)}
  .dayhead{position:sticky;top:0;padding:8px 6px;text-align:center;z-index:3}
  .dayhead .dow{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:500}
  .dayhead .dnum{font-size:17px;font-weight:600;margin-top:3px;color:var(--txt)}
  .dayhead.today .dnum{color:#fff;background:var(--accent);border-radius:50%;width:28px;height:28px;line-height:28px;display:inline-block}
  .dayhead.today .dow{color:var(--accent)}
  .colhead{display:grid;grid-template-columns:52px repeat(7,1fr);position:sticky;top:0;z-index:4;background:var(--bg);border-bottom:1px solid var(--line)}
  .colhead .cell{border-right:1px solid var(--line)}

  .body{position:relative}
  .lane{position:relative;border-right:1px solid var(--line)}
  .hourline{position:absolute;left:0;right:0;border-top:1px solid var(--line)}
  .hourlbl{position:absolute;right:7px;font-size:11px;color:var(--faint);transform:translateY(-7px)}
  .nowline{position:absolute;left:0;right:0;border-top:1.5px solid #ec4a57;z-index:2}
  .nowline::before{content:"";position:absolute;left:-3px;top:-4px;width:7px;height:7px;border-radius:50%;background:#ec4a57}

  .ev{position:absolute;border-radius:5px;padding:3px 8px;overflow:hidden;cursor:pointer;
    background:var(--elev);border:1px solid var(--line);font-size:12px;line-height:1.3;
    transition:background .1s,border-color .1s}
  .ev:hover{background:var(--elev2);border-color:var(--line2);z-index:5}
  .ev .t{font-weight:550;color:var(--txt);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
  /* тонкая карточка: одна строка «название, время», мельче и по центру по вертикали */
  .ev.tiny{display:flex;align-items:center;padding-top:0;padding-bottom:0}
  .ev.tiny .t{display:block;font-size:10.5px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
  .ev.tiny .tm{color:var(--faint);font-weight:400}
  .ev .ico{font-size:11px;color:var(--faint);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ev .badge{display:none} /* статус кодируется цветом карточки + легендой; текст-плашки убраны для чистоты */
  /* статус = мягкая заливка + аккуратная левая грань (inset, без сдвига раскладки) */
  .b-done{background:color-mix(in srgb,var(--done) 13%,var(--elev));box-shadow:inset 3px 0 0 var(--done)}
  .b-failed{background:color-mix(in srgb,var(--failed) 13%,var(--elev));box-shadow:inset 3px 0 0 var(--failed)}
  .b-pending{background:color-mix(in srgb,var(--pending) 13%,var(--elev));box-shadow:inset 3px 0 0 var(--pending)}
  .b-skipped{background:color-mix(in srgb,var(--skipped) 11%,var(--elev));box-shadow:inset 3px 0 0 var(--skipped)}
  .b-live{background:color-mix(in srgb,var(--live) 15%,var(--elev));box-shadow:inset 3px 0 0 var(--live)}
  .b-none{box-shadow:inset 3px 0 0 var(--none)}
  .b-live{animation:blink 2.4s ease-in-out infinite}
  @keyframes blink{50%{box-shadow:inset 3px 0 0 var(--live),0 0 0 1px rgba(91,140,255,.4)}}

  /* drawer */
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:10;opacity:0;transition:opacity .18s}
  .ov.open{display:block;opacity:1}
  .drawer{position:fixed;top:0;right:0;width:420px;max-width:94vw;height:100%;padding:22px;overflow:auto;transform:translateX(100%);
    transition:transform .22s cubic-bezier(.22,1,.36,1);background:var(--elev);border-left:1px solid var(--line2);box-shadow:-16px 0 48px -24px rgba(0,0,0,.8)}
  .ov.open .drawer{transform:none}
  .drawer h2{font-size:18px;margin:0 34px 12px 0;font-weight:600;line-height:1.35}
  .row{display:flex;gap:10px;margin:10px 0;font-size:13px;align-items:baseline}
  .row .k{color:var(--faint);min-width:92px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  .pill{display:inline-block;padding:4px 11px;border-radius:6px;font-weight:600;font-size:12px;color:#fff}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}
  .actions a{flex:1 1 auto}
  .actions a button{width:100%}
  .closex{position:absolute;top:16px;right:18px;background:var(--elev2);border:1px solid var(--line);width:30px;height:30px;border-radius:7px;
    font-size:14px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s}
  .closex:hover{background:#2a2a32;color:var(--txt)}
  pre.tr{white-space:pre-wrap;background:#101013;border:1px solid var(--line);border-radius:8px;padding:12px;font-size:12px;line-height:1.5;max-height:340px;overflow:auto;margin-top:12px;color:var(--txt)}
  .ext{color:var(--pending);font-size:11px;font-weight:500}
</style>
</head>
<body>
<header>
  <h1>📅 Tryll Meet</h1>
  <div class="nav">
    <button onclick="shift(-7)">‹</button>
    <button onclick="goToday()">Сегодня</button>
    <button onclick="shift(7)">›</button>
  </div>
  <div class="wkrange" id="wkrange"></div>
  <span class="spin" id="spin"></span>
  <div class="legend">
    <span class="lg"><i class="dot" style="background:var(--live)"></i>идёт</span>
    <span class="lg"><i class="dot" style="background:var(--done)"></i>записан</span>
    <span class="lg"><i class="dot" style="background:var(--pending)"></i>в работе</span>
    <span class="lg"><i class="dot" style="background:var(--failed)"></i>не записан</span>
    <span class="lg"><i class="dot" style="background:var(--skipped)"></i>пропущен</span>
    <span class="lg"><i class="dot" style="background:var(--none)"></i>нет бота</span>
  </div>
</header>

<div class="colhead" id="colhead"></div>
<div class="grid" id="grid"></div>

<div class="ov" id="ov" onclick="if(event.target===this)closeDrawer()">
  <div class="drawer" id="drawer"></div>
</div>

<script>
const DAY_START=0, DAY_END=24, PXH=52; // все 24ч, скролл по времени как в Google
const STATUS={live:["идёт / пишет","b-live"],done:["записан ✓","b-done"],failed:["не записан","b-failed"],
  skipped:["пропущен","b-skipped"],pending:["в работе","b-pending"],none:["нет бота","b-none"]};
let weekStart=mondayOf(new Date());
let cache=[];

function mondayOf(d){d=new Date(d);const w=(d.getDay()+6)%7;d.setHours(0,0,0,0);d.setDate(d.getDate()-w);return d}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}
function fmtRange(a){const b=addDays(a,6);const o={day:"numeric",month:"short"};return a.toLocaleDateString("ru-RU",o)+" – "+b.toLocaleDateString("ru-RU",o)+" "+b.getFullYear()}
function hhmm(iso){return new Date(iso).toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"})}
function esc(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}

function shift(n){weekStart=addDays(weekStart,n);render()}
function goToday(){weekStart=mondayOf(new Date());render()}

async function load(){
  const from=new Date(weekStart);const to=addDays(weekStart,7);
  document.getElementById("spin").textContent="загрузка…";
  try{
    const r=await fetch(`/api/meetings?from=${from.toISOString()}&to=${to.toISOString()}`);
    cache=await r.json();
  }catch(e){cache=[]}
  document.getElementById("spin").textContent="";
}

function dayHeads(){
  const today=new Date();today.setHours(0,0,0,0);
  let h='<div class="cell"></div>';
  for(let i=0;i<7;i++){const d=addDays(weekStart,i);const is=+d===+today;
    h+=`<div class="cell dayhead ${is?'today':''}"><div class="dow">${d.toLocaleDateString("ru-RU",{weekday:"short"})}</div><div class="dnum">${d.getDate()}</div></div>`}
  document.getElementById("colhead").innerHTML=h;
}

function render(){
  document.getElementById("wkrange").textContent=fmtRange(weekStart);
  dayHeads();
  load().then(draw);
}

function layout(evs){ // как в Google Calendar: РЯДОМ только реально пересекающиеся
  evs.forEach(e=>{e._s=+new Date(e.start);e._e=Math.max(+new Date(e.end),e._s+1)});
  evs.sort((a,b)=>a._s-b._s||a._e-b._e);
  let cluster=[],colEnds=[],clusterEnd=-1;
  const flush=()=>{const n=colEnds.length||1;cluster.forEach(e=>e._cols=n);cluster=[];colEnds=[];};
  evs.forEach(e=>{
    if(cluster.length&&e._s>=clusterEnd){flush();clusterEnd=-1;} // не пересекается с кластером → закрываем
    let col=colEnds.findIndex(end=>end<=e._s);              // первая свободная колонка (по РЕАЛЬному времени)
    if(col===-1){col=colEnds.length;colEnds.push(e._e);}else{colEnds[col]=e._e;}
    e._col=col;cluster.push(e);clusterEnd=Math.max(clusterEnd,e._e);
  });
  flush();
  // Кап высоты: для каждого мита — старт ближайшего события, что начинается ПОЗЖЕ и
  // перекрывается по ГОРИЗОНТАЛИ (та же ширина). Чтобы короткая карточка (мин-высота)
  // не налезала на следующий встык-мит под ней. Реально пересекающиеся (рядом) не капаются.
  evs.forEach(e=>{e._nextStart=null;const eL=e._col/e._cols,eR=(e._col+1)/e._cols;
    for(const o of evs){if(o===e||o._s<=e._s)continue;
      const oL=o._col/o._cols,oR=(o._col+1)/o._cols;
      if(oL<eR-1e-6&&oR>eL+1e-6&&(e._nextStart==null||o._s<e._nextStart))e._nextStart=o._s;}
  });
  return evs;
}

function draw(){
  const today=new Date();today.setHours(0,0,0,0);
  const hours=DAY_END-DAY_START;
  let h='<div class="gutter"><div style="position:relative;height:'+(hours*PXH)+'px">';
  for(let i=0;i<=hours;i++)h+=`<div class="hourlbl" style="top:${i*PXH}px">${DAY_START+i}:00</div>`;
  h+='</div></div>';
  for(let i=0;i<7;i++){
    const d=addDays(weekStart,i);
    const dayEvs=cache.filter(e=>{const s=new Date(e.start);return s>=d&&s<addDays(d,1)});
    layout(dayEvs);
    h+='<div class="lane" style="height:'+(hours*PXH)+'px">';
    for(let k=0;k<=hours;k++)h+=`<div class="hourline" style="top:${k*PXH}px"></div>`;
    // линия текущего времени
    if(+d===+today){const now=new Date();const mins=(now.getHours()+now.getMinutes()/60-DAY_START)*PXH;
      if(mins>=0&&mins<=hours*PXH)h+=`<div class="nowline" style="top:${mins}px"></div>`}
    dayEvs.forEach((e,idx)=>{
      const s=new Date(e.start),en=new Date(e.end);
      const laneH=hours*PXH;
      let top=(s.getHours()+s.getMinutes()/60-DAY_START)*PXH;
      let hgt=Math.max(((en-s)/3600000)*PXH-2,22);
      const gapPx=e._nextStart!=null?((e._nextStart-e._s)/3600000*PXH-1):1e9;
      hgt=Math.min(hgt,gapPx);                // короткая карточка не налезает на следующий встык-мит (идут стопкой)
      if(top<0){hgt+=top;top=0}
      if(top>laneH-14)top=laneH-14;           // событие в самом низу — не торчит за сетку
      if(top+hgt>laneH)hgt=laneH-top;
      if(hgt<13)hgt=13;
      const w=100/e._cols, left=e._col*w;
      const st=STATUS[e.botStatus]||STATUS.none;
      const hasBot=e.botStatus!=="none";
      const showBadge=hasBot&&hgt>=46;        // плашка только если влезает
      const showTime=hgt>=30;
      const tiny=hgt<30;
      const attrs=`style="top:${top}px;height:${hgt}px;left:calc(${left}% + 3px);width:calc(${w}% - 6px)" onclick="openDrawer('${e.id}')" title="${esc(e.title)}"`;
      if(tiny){ // тонкая карточка — одна центрированная строка «название, время»
        h+=`<div class="ev ${st[1]} tiny" ${attrs}><div class="t">${esc(e.title)}<span class="tm">, ${hhmm(e.start)}</span></div></div>`;
      }else{
        const tLines=Math.max(1,Math.floor((hgt-4-(showTime?14:0))/15)); // строк заголовка под высоту карточки
        h+=`<div class="ev ${st[1]}" ${attrs}>
          <div class="t" style="-webkit-line-clamp:${tLines}">${esc(e.title)}</div>
          ${showTime?`<div class="ico">${hhmm(e.start)}${e.externalOrganizer?' · <span class="ext">внеш.</span>':''}${e.norec?' · 🚫':''}</div>`:''}
          ${showBadge?`<span class="badge">${st[0]}</span>`:''}
        </div>`;
      }
    });
    h+='</div>';
  }
  document.getElementById("grid").innerHTML=h;
  // выровнять колонки шапки под скроллбар сетки (иначе линии дней «плывут»)
  const _g=document.getElementById("grid");
  document.getElementById("colhead").style.paddingRight=(_g.offsetWidth-_g.clientWidth)+"px";
  // при первом рендере — прокрутить к рабочему времени (около «сейчас», иначе 7:00);
  // дальше пользователь крутит сам на все 24ч (ночные миты видно).
  if(!window.__scrolled){window.__scrolled=true;
    const g=document.getElementById("grid");
    const now=new Date();
    const startHour=(+mondayOf(now)===+weekStart)?Math.max(0,now.getHours()-1):7;
    g.scrollTop=startHour*PXH;
  }
}

async function openDrawer(id){
  const e=cache.find(x=>x.id===id);if(!e)return;
  const st=STATUS[e.botStatus]||STATUS.none;
  const dr=document.getElementById("drawer");
  dr.innerHTML=`<button class="closex" onclick="closeDrawer()">✕</button>
    <h2>${esc(e.title)}</h2>
    <span class="pill ${st[1]}" style="background:var(--${e.botStatus});${e.botStatus==='pending'?'color:#1a1205':''}">${st[0]}</span>
    <div class="row"><span class="k">Когда</span><span>${new Date(e.start).toLocaleString("ru-RU",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}–${hhmm(e.end)}</span></div>
    <div class="row"><span class="k">Организатор</span><span>${esc(e.organizer)||"—"} ${e.externalOrganizer?'<span class="ext">(внешний)</span>':''}</span></div>
    <div class="row"><span class="k">Участники</span><span>${(e.attendees||[]).map(esc).join("<br>")||"—"}</span></div>
    ${e.error?`<div class="row"><span class="k">Ошибка</span><span style="color:#ff8a8a">${esc(e.error)}</span></div>`:""}
    <div class="actions">
      ${e.noteUrl?`<a href="${esc(e.noteUrl)}" target="_blank"><button class="primary">📄 Заметки на Drive</button></a>`:""}
      ${e.meetUrl?`<a href="${esc(e.meetUrl)}" target="_blank"><button>🎥 Открыть Meet</button></a>`:""}
      ${e.meetCode?`<button onclick="viewTranscript('${e.meetCode}')">📝 Транскрипт</button>`:""}
      ${e.meetCode?`<button onclick="resend('${e.meetCode}',this)">🤖 Переотправить бота</button>`:""}
      <button onclick="toggleSkip('${e.id}',this)">${e.manualSkip?'✅ Вернуть бота':'🚫 Бота не впускать'}</button>
    </div>
    <div id="trbox"></div>`;
  document.getElementById("ov").classList.add("open");
}
function closeDrawer(){document.getElementById("ov").classList.remove("open")}

async function viewTranscript(code){
  const box=document.getElementById("trbox");box.innerHTML='<div class="spin">загрузка транскрипта…</div>';
  const r=await fetch(`/api/transcript?code=${code}`);const d=await r.json();
  box.innerHTML=d.transcript?`<pre class="tr">${esc(d.transcript)}</pre>`:'<div class="spin" style="margin-top:8px">транскрипта нет</div>';
}
async function toggleSkip(id,btn){
  const e=cache.find(x=>x.id===id);if(!e)return;
  const on=!e.manualSkip;
  btn.disabled=true;btn.textContent="…";
  try{
    await fetch("/api/skip",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({eventId:e.id,nativeId:e.meetCode,code:e.meetCode,title:e.title,on})});
    await load();draw();openDrawer(id); // обновить статус + перерисовать панель
  }catch(err){btn.disabled=false;btn.textContent="ошибка"}
}
async function resend(code,btn){
  btn.disabled=true;btn.textContent="отправляю…";
  try{const r=await fetch("/api/redispatch",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code})});
    const d=await r.json();btn.textContent=d.ok?"✓ отправлен":"ошибка "+d.status;}
  catch(e){btn.textContent="ошибка"}
  setTimeout(()=>{btn.disabled=false;btn.textContent="🤖 Переотправить бота"},3000);
}

document.addEventListener("keydown",e=>{if(e.key==="Escape")closeDrawer()});
render();
setInterval(()=>{load().then(draw)},45000); // авто-обновление статусов
</script>
</body>
</html>
