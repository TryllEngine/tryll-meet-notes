<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tryll Meet — календарь созвонов</title>
<style>
  :root{
    --bg:#0f1320; --panel:#161b2e; --panel2:#1d2438; --line:#2a3350; --txt:#e8ecf6;
    --muted:#8a93ad; --navy:#3b5bdb; --accent:#6c8cff;
    --done:#1f9d63; --failed:#d94b4b; --skipped:#5b647d; --pending:#d99a2b; --live:#2f7fe0; --none:#39425e;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.4 -apple-system,Segoe UI,Roboto,Arial,sans-serif}
  header{display:flex;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:5}
  header h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.2px}
  .wkrange{font-size:15px;font-weight:600;min-width:230px}
  button{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px}
  button:hover{border-color:var(--accent)}
  button.primary{background:var(--navy);border-color:var(--navy);font-weight:600}
  .nav{display:flex;gap:6px;align-items:center}
  .legend{display:flex;gap:14px;margin-left:auto;flex-wrap:wrap;align-items:center}
  .lg{display:flex;gap:6px;align-items:center;font-size:12px;color:var(--muted)}
  .dot{width:11px;height:11px;border-radius:3px;display:inline-block}
  .spin{color:var(--muted);font-size:12px}

  .grid{display:grid;grid-template-columns:56px repeat(7,1fr);height:calc(100vh - 58px);overflow:auto}
  .gutter,.daycol{border-right:1px solid var(--line)}
  .dayhead{position:sticky;top:0;background:var(--panel);border-bottom:1px solid var(--line);padding:8px 6px;text-align:center;z-index:3}
  .dayhead .dow{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .dayhead .dnum{font-size:18px;font-weight:700;margin-top:2px}
  .dayhead.today .dnum{color:#fff;background:var(--navy);border-radius:50%;width:30px;height:30px;line-height:30px;display:inline-block}
  .colhead{display:grid;grid-template-columns:56px repeat(7,1fr);position:sticky;top:0;z-index:4}
  .colhead .cell{border-right:1px solid var(--line)}

  .body{position:relative}
  .lane{position:relative;border-right:1px solid var(--line)}
  .hourline{position:absolute;left:0;right:0;border-top:1px solid var(--line);opacity:.5}
  .hourlbl{position:absolute;right:6px;font-size:11px;color:var(--muted);transform:translateY(-7px)}
  .nowline{position:absolute;left:0;right:0;border-top:2px solid #ff5d5d;z-index:2}
  .nowline::before{content:"";position:absolute;left:-4px;top:-5px;width:8px;height:8px;border-radius:50%;background:#ff5d5d}

  .ev{position:absolute;left:3px;right:3px;border-radius:7px;padding:3px 7px;overflow:hidden;cursor:pointer;border-left:4px solid;background:var(--panel2);box-shadow:0 1px 4px rgba(0,0,0,.3);font-size:12px;display:flex;flex-direction:column;gap:1px}
  .ev:hover{filter:brightness(1.18)}
  .ev .t{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.25}
  .ev.tiny .t{font-size:11px}
  .ev .badge{align-self:flex-start;font-size:10px;padding:1px 6px;border-radius:4px;margin-top:1px;font-weight:600;white-space:nowrap}
  .ev .ico{font-size:11px;opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .b-done{border-color:var(--done)} .b-done .badge{background:var(--done)}
  .b-failed{border-color:var(--failed)} .b-failed .badge{background:var(--failed)}
  .b-skipped{border-color:var(--skipped)} .b-skipped .badge{background:var(--skipped)}
  .b-pending{border-color:var(--pending)} .b-pending .badge{background:var(--pending);color:#1a1205}
  .b-live{border-color:var(--live)} .b-live .badge{background:var(--live)}
  .b-none{border-color:var(--none)} .b-none .badge{background:var(--none)}
  .b-live{animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(47,127,224,.5)}50%{box-shadow:0 0 0 4px rgba(47,127,224,0)}}

  /* drawer */
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:10}
  .ov.open{display:block}
  .drawer{position:fixed;top:0;right:0;width:420px;max-width:92vw;height:100%;background:var(--panel);border-left:1px solid var(--line);padding:20px;overflow:auto;transform:translateX(100%);transition:transform .18s}
  .ov.open .drawer{transform:none}
  .drawer h2{font-size:17px;margin:0 6px 4px 0}
  .row{display:flex;gap:8px;margin:8px 0;font-size:13px}
  .row .k{color:var(--muted);min-width:90px}
  .pill{display:inline-block;padding:3px 9px;border-radius:6px;font-weight:600;font-size:12px}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .actions a button{width:100%}
  .closex{float:right;background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer}
  pre.tr{white-space:pre-wrap;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px;font-size:12px;max-height:300px;overflow:auto;margin-top:8px}
  .ext{color:#ffb454;font-size:11px}
</style>
</head>
<body>
<header>
  <h1>📅 Tryll Meet</h1>
  <div class="nav">
    <button onclick="shift(-7)">‹</button>
    <button onclick="goToday()">Сегодня</button>
    <button onclick="shift(7)">›</button>
  </div>
  <div class="wkrange" id="wkrange"></div>
  <span class="spin" id="spin"></span>
  <div class="legend">
    <span class="lg"><i class="dot" style="background:var(--live)"></i>идёт</span>
    <span class="lg"><i class="dot" style="background:var(--done)"></i>записан</span>
    <span class="lg"><i class="dot" style="background:var(--pending)"></i>в работе</span>
    <span class="lg"><i class="dot" style="background:var(--failed)"></i>не записан</span>
    <span class="lg"><i class="dot" style="background:var(--skipped)"></i>пропущен</span>
    <span class="lg"><i class="dot" style="background:var(--none)"></i>нет бота</span>
  </div>
</header>

<div class="colhead" id="colhead"></div>
<div class="grid" id="grid"></div>

<div class="ov" id="ov" onclick="if(event.target===this)closeDrawer()">
  <div class="drawer" id="drawer"></div>
</div>

<script>
const DAY_START=7, DAY_END=22, PXH=52; // 7:00–22:00, 52px/час
const STATUS={live:["идёт / пишет","b-live"],done:["записан ✓","b-done"],failed:["не записан","b-failed"],
  skipped:["пропущен","b-skipped"],pending:["в работе","b-pending"],none:["нет бота","b-none"]};
let weekStart=mondayOf(new Date());
let cache=[];

function mondayOf(d){d=new Date(d);const w=(d.getDay()+6)%7;d.setHours(0,0,0,0);d.setDate(d.getDate()-w);return d}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}
function fmtRange(a){const b=addDays(a,6);const o={day:"numeric",month:"short"};return a.toLocaleDateString("ru-RU",o)+" – "+b.toLocaleDateString("ru-RU",o)+" "+b.getFullYear()}
function hhmm(iso){return new Date(iso).toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"})}
function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))}

function shift(n){weekStart=addDays(weekStart,n);render()}
function goToday(){weekStart=mondayOf(new Date());render()}

async function load(){
  const from=new Date(weekStart);const to=addDays(weekStart,7);
  document.getElementById("spin").textContent="загрузка…";
  try{
    const r=await fetch(`/api/meetings?from=${from.toISOString()}&to=${to.toISOString()}`);
    cache=await r.json();
  }catch(e){cache=[]}
  document.getElementById("spin").textContent="";
}

function dayHeads(){
  const today=new Date();today.setHours(0,0,0,0);
  let h='<div class="cell"></div>';
  for(let i=0;i<7;i++){const d=addDays(weekStart,i);const is=+d===+today;
    h+=`<div class="cell dayhead ${is?'today':''}"><div class="dow">${d.toLocaleDateString("ru-RU",{weekday:"short"})}</div><div class="dnum">${d.getDate()}</div></div>`}
  document.getElementById("colhead").innerHTML=h;
}

function render(){
  document.getElementById("wkrange").textContent=fmtRange(weekStart);
  dayHeads();
  load().then(draw);
}

function layout(evs){ // простая раскладка пересечений в колонке
  evs.sort((a,b)=>new Date(a.start)-new Date(b.start));
  const cols=[];
  evs.forEach(e=>{e._s=new Date(e.start);e._e=new Date(e.end);
    let placed=false;
    for(const col of cols){if(col[col.length-1]._e<=e._s){col.push(e);e._col=cols.indexOf(col);placed=true;break}}
    if(!placed){e._col=cols.length;cols.push([e])}});
  evs.forEach(e=>e._cols=cols.length);
  return evs;
}

function draw(){
  const today=new Date();today.setHours(0,0,0,0);
  const hours=DAY_END-DAY_START;
  let h='<div class="gutter"><div style="position:relative;height:'+(hours*PXH)+'px">';
  for(let i=0;i<=hours;i++)h+=`<div class="hourlbl" style="top:${i*PXH}px">${DAY_START+i}:00</div>`;
  h+='</div></div>';
  for(let i=0;i<7;i++){
    const d=addDays(weekStart,i);
    const dayEvs=cache.filter(e=>{const s=new Date(e.start);return s>=d&&s<addDays(d,1)});
    layout(dayEvs);
    h+='<div class="lane" style="height:'+(hours*PXH)+'px">';
    for(let k=0;k<=hours;k++)h+=`<div class="hourline" style="top:${k*PXH}px"></div>`;
    // линия текущего времени
    if(+d===+today){const now=new Date();const mins=(now.getHours()+now.getMinutes()/60-DAY_START)*PXH;
      if(mins>=0&&mins<=hours*PXH)h+=`<div class="nowline" style="top:${mins}px"></div>`}
    dayEvs.forEach((e,idx)=>{
      const s=new Date(e.start),en=new Date(e.end);
      let top=(s.getHours()+s.getMinutes()/60-DAY_START)*PXH;
      let hgt=Math.max(((en-s)/3600000)*PXH-2,22);
      if(top<0){hgt+=top;top=0}
      const w=100/e._cols, left=e._col*w;
      const st=STATUS[e.botStatus]||STATUS.none;
      const hasBot=e.botStatus!=="none";
      const showBadge=hasBot&&hgt>=46;        // плашка только если влезает
      const showTime=hgt>=30;
      const tiny=hgt<30;
      h+=`<div class="ev ${st[1]} ${tiny?'tiny':''}" style="top:${top}px;height:${hgt}px;left:calc(${left}% + 3px);width:calc(${w}% - 6px)" onclick="openDrawer('${e.id}')" title="${esc(e.title)}">
        <div class="t">${esc(e.title)}</div>
        ${showTime?`<div class="ico">${hhmm(e.start)}${e.externalOrganizer?' · <span class="ext">внеш.</span>':''}${e.norec?' · 🚫':''}</div>`:''}
        ${showBadge?`<span class="badge">${st[0]}</span>`:''}
      </div>`;
    });
    h+='</div>';
  }
  document.getElementById("grid").innerHTML=h;
}

async function openDrawer(id){
  const e=cache.find(x=>x.id===id);if(!e)return;
  const st=STATUS[e.botStatus]||STATUS.none;
  const dr=document.getElementById("drawer");
  dr.innerHTML=`<button class="closex" onclick="closeDrawer()">✕</button>
    <h2>${esc(e.title)}</h2>
    <span class="pill ${st[1]}" style="background:var(--${e.botStatus});${e.botStatus==='pending'?'color:#1a1205':''}">${st[0]}</span>
    <div class="row"><span class="k">Когда</span><span>${new Date(e.start).toLocaleString("ru-RU",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}–${hhmm(e.end)}</span></div>
    <div class="row"><span class="k">Организатор</span><span>${esc(e.organizer)||"—"} ${e.externalOrganizer?'<span class="ext">(внешний)</span>':''}</span></div>
    <div class="row"><span class="k">Участники</span><span>${(e.attendees||[]).map(esc).join("<br>")||"—"}</span></div>
    ${e.error?`<div class="row"><span class="k">Ошибка</span><span style="color:#ff8a8a">${esc(e.error)}</span></div>`:""}
    <div class="actions">
      ${e.noteUrl?`<a href="${e.noteUrl}" target="_blank"><button class="primary">📄 Заметки на Drive</button></a>`:""}
      ${e.meetUrl?`<a href="${e.meetUrl}" target="_blank"><button>🎥 Открыть Meet</button></a>`:""}
      ${e.meetCode?`<button onclick="viewTranscript('${e.meetCode}')">📝 Транскрипт</button>`:""}
      ${e.meetCode?`<button onclick="resend('${e.meetCode}',this)">🤖 Переотправить бота</button>`:""}
    </div>
    <div id="trbox"></div>`;
  document.getElementById("ov").classList.add("open");
}
function closeDrawer(){document.getElementById("ov").classList.remove("open")}

async function viewTranscript(code){
  const box=document.getElementById("trbox");box.innerHTML='<div class="spin">загрузка транскрипта…</div>';
  const r=await fetch(`/api/transcript?code=${code}`);const d=await r.json();
  box.innerHTML=d.transcript?`<pre class="tr">${esc(d.transcript)}</pre>`:'<div class="spin" style="margin-top:8px">транскрипта нет</div>';
}
async function resend(code,btn){
  btn.disabled=true;btn.textContent="отправляю…";
  try{const r=await fetch("/api/redispatch",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code})});
    const d=await r.json();btn.textContent=d.ok?"✓ отправлен":"ошибка "+d.status;}
  catch(e){btn.textContent="ошибка"}
  setTimeout(()=>{btn.disabled=false;btn.textContent="🤖 Переотправить бота"},3000);
}

document.addEventListener("keydown",e=>{if(e.key==="Escape")closeDrawer()});
render();
setInterval(()=>{load().then(draw)},45000); // авто-обновление статусов
</script>
</body>
</html>
