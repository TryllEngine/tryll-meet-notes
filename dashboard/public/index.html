<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tryll Meet — календарь созвонов</title>
<style>
  :root{
    --bg:#070a12; --bg2:#0c1120;
    --txt:#eef2fb; --muted:#8a95b2; --faint:#5c6685;
    --glass:rgba(255,255,255,.05); --glass2:rgba(255,255,255,.075);
    --stroke:rgba(255,255,255,.10); --stroke-soft:rgba(255,255,255,.06);
    --accent:#7c9bff; --accent2:#a78bfa;
    --navy:#5470ff;
    --live:#4f8cff; --done:#20c98a; --failed:#f0575f; --pending:#f4ab2e; --skipped:#7080a0; --none:#404b6b;
    --live-bg:rgba(79,140,255,.16); --done-bg:rgba(32,201,138,.14); --failed-bg:rgba(240,87,95,.14);
    --pending-bg:rgba(244,171,46,.15); --skipped-bg:rgba(112,128,160,.12); --none-bg:rgba(255,255,255,.035);
  }
  *{box-sizing:border-box}
  ::selection{background:rgba(124,155,255,.35)}
  html,body{height:100%}
  body{margin:0;color:var(--txt);font:14px/1.45 "Segoe UI Variable","Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:
      radial-gradient(1100px 600px at 80% -10%, rgba(124,155,255,.14), transparent 60%),
      radial-gradient(900px 500px at 0% 110%, rgba(167,139,250,.12), transparent 55%),
      linear-gradient(180deg,var(--bg2),var(--bg));
    background-attachment:fixed;-webkit-font-smoothing:antialiased}
  /* тонкие современные скроллы */
  *::-webkit-scrollbar{width:10px;height:10px}
  *::-webkit-scrollbar-thumb{background:rgba(255,255,255,.10);border-radius:20px;border:3px solid transparent;background-clip:content-box}
  *::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.20);background-clip:content-box}
  *::-webkit-scrollbar-track{background:transparent}

  header{display:flex;align-items:center;gap:16px;padding:13px 22px;position:sticky;top:0;z-index:6;
    background:rgba(10,14,26,.55);backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%);
    border-bottom:1px solid var(--stroke-soft);box-shadow:0 1px 0 rgba(255,255,255,.03)}
  header h1{font-size:15px;margin:0;font-weight:700;letter-spacing:.3px;display:flex;align-items:center;gap:9px;color:var(--txt)}
  header h1::before{content:"";width:9px;height:9px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 12px rgba(124,155,255,.8)}
  .wkrange{font-size:14.5px;font-weight:650;min-width:220px;color:var(--txt);letter-spacing:.2px}
  button{background:var(--glass);color:var(--txt);border:1px solid var(--stroke);border-radius:10px;padding:8px 13px;cursor:pointer;
    font-size:13px;font-weight:550;transition:all .15s ease;backdrop-filter:blur(6px)}
  button:hover{background:var(--glass2);border-color:rgba(124,155,255,.5);transform:translateY(-1px)}
  button:active{transform:translateY(0)}
  button.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#0a0e1a;font-weight:700;
    box-shadow:0 6px 18px -6px rgba(124,155,255,.6)}
  button.primary:hover{filter:brightness(1.07);transform:translateY(-1px)}
  .nav{display:flex;gap:7px;align-items:center}
  .nav button{padding:8px 12px;line-height:1}
  .legend{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap;align-items:center}
  .lg{display:flex;gap:7px;align-items:center;font-size:11.5px;color:var(--muted);font-weight:500;
    background:var(--glass);border:1px solid var(--stroke-soft);padding:4px 10px;border-radius:20px}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;box-shadow:0 0 8px currentColor}
  .spin{color:var(--accent);font-size:12px;font-weight:500}

  .grid{display:grid;grid-template-columns:56px repeat(7,1fr);height:calc(100vh - 108px);overflow:auto}
  .gutter,.daycol{border-right:1px solid var(--stroke-soft)}
  .dayhead{position:sticky;top:0;padding:10px 6px;text-align:center;z-index:3}
  .dayhead .dow{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600}
  .dayhead .dnum{font-size:19px;font-weight:750;margin-top:3px;color:var(--txt)}
  .dayhead.today .dnum{color:#0a0e1a;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:50%;
    width:32px;height:32px;line-height:32px;display:inline-block;box-shadow:0 4px 14px -3px rgba(124,155,255,.7)}
  .dayhead.today .dow{color:var(--accent)}
  .colhead{display:grid;grid-template-columns:56px repeat(7,1fr);position:sticky;top:0;z-index:4;
    background:rgba(10,14,26,.5);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--stroke-soft)}
  .colhead .cell{border-right:1px solid var(--stroke-soft)}

  .body{position:relative}
  .lane{position:relative;border-right:1px solid var(--stroke-soft)}
  .lane:nth-child(even){background:rgba(255,255,255,.012)}
  .hourline{position:absolute;left:0;right:0;border-top:1px solid rgba(255,255,255,.045)}
  .hourlbl{position:absolute;right:8px;font-size:10.5px;color:var(--faint);font-weight:500;transform:translateY(-7px)}
  .nowline{position:absolute;left:0;right:0;border-top:2px solid #ff5d6c;z-index:2;box-shadow:0 0 10px rgba(255,93,108,.6)}
  .nowline::before{content:"";position:absolute;left:-4px;top:-5px;width:9px;height:9px;border-radius:50%;background:#ff5d6c;box-shadow:0 0 8px #ff5d6c}

  .ev{position:absolute;left:3px;right:3px;border-radius:10px;padding:4px 9px;overflow:hidden;cursor:pointer;
    border:1px solid var(--stroke-soft);border-left:3px solid;background:var(--none-bg);
    box-shadow:0 2px 10px -4px rgba(0,0,0,.5);font-size:12px;display:flex;flex-direction:column;gap:1px;
    transition:transform .12s ease,box-shadow .12s ease,filter .12s ease}
  .ev:hover{transform:translateY(-1px) scale(1.008);box-shadow:0 8px 22px -6px rgba(0,0,0,.6);filter:brightness(1.1);z-index:5}
  .ev .t{font-weight:640;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;letter-spacing:.1px}
  .ev.tiny{padding:2px 8px}
  .ev.tiny .t{font-size:11px}
  .ev .badge{align-self:flex-start;font-size:9.5px;padding:1.5px 8px;border-radius:20px;margin-top:2px;font-weight:700;
    white-space:nowrap;letter-spacing:.2px;text-transform:lowercase}
  .ev .ico{font-size:10.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
  .b-done{border-color:var(--done);background:var(--done-bg)} .b-done .badge{background:var(--done);color:#04160e}
  .b-failed{border-color:var(--failed);background:var(--failed-bg)} .b-failed .badge{background:var(--failed);color:#1a0405}
  .b-skipped{border-color:var(--skipped);background:var(--skipped-bg)} .b-skipped .badge{background:var(--skipped);color:#0a0e1a}
  .b-pending{border-color:var(--pending);background:var(--pending-bg)} .b-pending .badge{background:var(--pending);color:#1a1205}
  .b-live{border-color:var(--live);background:var(--live-bg)} .b-live .badge{background:var(--live);color:#04101f}
  .b-none{border-color:var(--none);background:var(--none-bg)} .b-none .badge{background:var(--none);color:#0a0e1a}
  .b-live{animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(79,140,255,.45),0 2px 10px -4px rgba(0,0,0,.5)}50%{box-shadow:0 0 0 5px rgba(79,140,255,0),0 2px 10px -4px rgba(0,0,0,.5)}}

  /* drawer */
  .ov{position:fixed;inset:0;background:rgba(4,6,12,.55);backdrop-filter:blur(3px);display:none;z-index:10;opacity:0;transition:opacity .2s}
  .ov.open{display:block;opacity:1}
  .drawer{position:fixed;top:0;right:0;width:440px;max-width:94vw;height:100%;padding:24px;overflow:auto;transform:translateX(100%);transition:transform .28s cubic-bezier(.22,1,.36,1);
    background:rgba(14,19,34,.82);backdrop-filter:blur(26px) saturate(140%);-webkit-backdrop-filter:blur(26px) saturate(140%);
    border-left:1px solid var(--stroke);box-shadow:-24px 0 60px -20px rgba(0,0,0,.7)}
  .ov.open .drawer{transform:none}
  .drawer h2{font-size:19px;margin:2px 30px 10px 0;font-weight:720;letter-spacing:.2px;line-height:1.3}
  .row{display:flex;gap:10px;margin:11px 0;font-size:13px;align-items:baseline}
  .row .k{color:var(--faint);min-width:96px;font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  .pill{display:inline-block;padding:4px 12px;border-radius:20px;font-weight:700;font-size:11.5px;letter-spacing:.2px;color:#0a0e1a;box-shadow:0 4px 14px -6px rgba(0,0,0,.5)}
  .actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:18px}
  .actions a{flex:1 1 auto}
  .actions a button{width:100%}
  .closex{position:absolute;top:18px;right:20px;background:var(--glass);border:1px solid var(--stroke-soft);width:32px;height:32px;border-radius:50%;
    font-size:15px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .closex:hover{background:var(--glass2);color:var(--txt);transform:rotate(90deg)}
  pre.tr{white-space:pre-wrap;background:rgba(0,0,0,.28);border:1px solid var(--stroke-soft);border-radius:12px;padding:13px;font-size:12px;line-height:1.5;max-height:340px;overflow:auto;margin-top:12px;color:var(--txt)}
  .ext{color:var(--pending);font-size:11px;font-weight:600}
</style>
</head>
<body>
<header>
  <h1>📅 Tryll Meet</h1>
  <div class="nav">
    <button onclick="shift(-7)">‹</button>
    <button onclick="goToday()">Сегодня</button>
    <button onclick="shift(7)">›</button>
  </div>
  <div class="wkrange" id="wkrange"></div>
  <span class="spin" id="spin"></span>
  <div class="legend">
    <span class="lg"><i class="dot" style="background:var(--live)"></i>идёт</span>
    <span class="lg"><i class="dot" style="background:var(--done)"></i>записан</span>
    <span class="lg"><i class="dot" style="background:var(--pending)"></i>в работе</span>
    <span class="lg"><i class="dot" style="background:var(--failed)"></i>не записан</span>
    <span class="lg"><i class="dot" style="background:var(--skipped)"></i>пропущен</span>
    <span class="lg"><i class="dot" style="background:var(--none)"></i>нет бота</span>
  </div>
</header>

<div class="colhead" id="colhead"></div>
<div class="grid" id="grid"></div>

<div class="ov" id="ov" onclick="if(event.target===this)closeDrawer()">
  <div class="drawer" id="drawer"></div>
</div>

<script>
const DAY_START=7, DAY_END=22, PXH=52; // 7:00–22:00, 52px/час
const STATUS={live:["идёт / пишет","b-live"],done:["записан ✓","b-done"],failed:["не записан","b-failed"],
  skipped:["пропущен","b-skipped"],pending:["в работе","b-pending"],none:["нет бота","b-none"]};
let weekStart=mondayOf(new Date());
let cache=[];

function mondayOf(d){d=new Date(d);const w=(d.getDay()+6)%7;d.setHours(0,0,0,0);d.setDate(d.getDate()-w);return d}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}
function fmtRange(a){const b=addDays(a,6);const o={day:"numeric",month:"short"};return a.toLocaleDateString("ru-RU",o)+" – "+b.toLocaleDateString("ru-RU",o)+" "+b.getFullYear()}
function hhmm(iso){return new Date(iso).toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"})}
function esc(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}

function shift(n){weekStart=addDays(weekStart,n);render()}
function goToday(){weekStart=mondayOf(new Date());render()}

async function load(){
  const from=new Date(weekStart);const to=addDays(weekStart,7);
  document.getElementById("spin").textContent="загрузка…";
  try{
    const r=await fetch(`/api/meetings?from=${from.toISOString()}&to=${to.toISOString()}`);
    cache=await r.json();
  }catch(e){cache=[]}
  document.getElementById("spin").textContent="";
}

function dayHeads(){
  const today=new Date();today.setHours(0,0,0,0);
  let h='<div class="cell"></div>';
  for(let i=0;i<7;i++){const d=addDays(weekStart,i);const is=+d===+today;
    h+=`<div class="cell dayhead ${is?'today':''}"><div class="dow">${d.toLocaleDateString("ru-RU",{weekday:"short"})}</div><div class="dnum">${d.getDate()}</div></div>`}
  document.getElementById("colhead").innerHTML=h;
}

function render(){
  document.getElementById("wkrange").textContent=fmtRange(weekStart);
  dayHeads();
  load().then(draw);
}

function layout(evs){ // раскладка как в Google Calendar: кластеры пересечений
  evs.forEach(e=>{e._s=+new Date(e.start);e._e=Math.max(+new Date(e.end),e._s+60000)});
  evs.sort((a,b)=>a._s-b._s||a._e-b._e);
  let cluster=[],colEnds=[],clusterEnd=-1;
  const flush=()=>{const n=colEnds.length||1;cluster.forEach(e=>e._cols=n);cluster=[];colEnds=[];};
  evs.forEach(e=>{
    if(cluster.length&&e._s>=clusterEnd){flush();clusterEnd=-1;} // событие не пересекается с кластером → закрываем
    let col=colEnds.findIndex(end=>end<=e._s);              // первая свободная колонка
    if(col===-1){col=colEnds.length;colEnds.push(e._e);}else{colEnds[col]=e._e;}
    e._col=col;cluster.push(e);clusterEnd=Math.max(clusterEnd,e._e);
  });
  flush();
  return evs;
}

function draw(){
  const today=new Date();today.setHours(0,0,0,0);
  const hours=DAY_END-DAY_START;
  let h='<div class="gutter"><div style="position:relative;height:'+(hours*PXH)+'px">';
  for(let i=0;i<=hours;i++)h+=`<div class="hourlbl" style="top:${i*PXH}px">${DAY_START+i}:00</div>`;
  h+='</div></div>';
  for(let i=0;i<7;i++){
    const d=addDays(weekStart,i);
    const dayEvs=cache.filter(e=>{const s=new Date(e.start);return s>=d&&s<addDays(d,1)});
    layout(dayEvs);
    h+='<div class="lane" style="height:'+(hours*PXH)+'px">';
    for(let k=0;k<=hours;k++)h+=`<div class="hourline" style="top:${k*PXH}px"></div>`;
    // линия текущего времени
    if(+d===+today){const now=new Date();const mins=(now.getHours()+now.getMinutes()/60-DAY_START)*PXH;
      if(mins>=0&&mins<=hours*PXH)h+=`<div class="nowline" style="top:${mins}px"></div>`}
    dayEvs.forEach((e,idx)=>{
      const s=new Date(e.start),en=new Date(e.end);
      const laneH=hours*PXH;
      let top=(s.getHours()+s.getMinutes()/60-DAY_START)*PXH;
      let hgt=Math.max(((en-s)/3600000)*PXH-2,22);
      if(top<0){hgt+=top;top=0}
      if(top>laneH-18)top=laneH-18;          // событие позже сетки — не торчит вниз
      if(top+hgt>laneH)hgt=laneH-top;         // не вылезает за низ
      if(hgt<18)hgt=18;
      const w=100/e._cols, left=e._col*w;
      const st=STATUS[e.botStatus]||STATUS.none;
      const hasBot=e.botStatus!=="none";
      const showBadge=hasBot&&hgt>=46;        // плашка только если влезает
      const showTime=hgt>=30;
      const tiny=hgt<30;
      h+=`<div class="ev ${st[1]} ${tiny?'tiny':''}" style="top:${top}px;height:${hgt}px;left:calc(${left}% + 3px);width:calc(${w}% - 6px)" onclick="openDrawer('${e.id}')" title="${esc(e.title)}">
        <div class="t">${esc(e.title)}</div>
        ${showTime?`<div class="ico">${hhmm(e.start)}${e.externalOrganizer?' · <span class="ext">внеш.</span>':''}${e.norec?' · 🚫':''}</div>`:''}
        ${showBadge?`<span class="badge">${st[0]}</span>`:''}
      </div>`;
    });
    h+='</div>';
  }
  document.getElementById("grid").innerHTML=h;
}

async function openDrawer(id){
  const e=cache.find(x=>x.id===id);if(!e)return;
  const st=STATUS[e.botStatus]||STATUS.none;
  const dr=document.getElementById("drawer");
  dr.innerHTML=`<button class="closex" onclick="closeDrawer()">✕</button>
    <h2>${esc(e.title)}</h2>
    <span class="pill ${st[1]}" style="background:var(--${e.botStatus});${e.botStatus==='pending'?'color:#1a1205':''}">${st[0]}</span>
    <div class="row"><span class="k">Когда</span><span>${new Date(e.start).toLocaleString("ru-RU",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}–${hhmm(e.end)}</span></div>
    <div class="row"><span class="k">Организатор</span><span>${esc(e.organizer)||"—"} ${e.externalOrganizer?'<span class="ext">(внешний)</span>':''}</span></div>
    <div class="row"><span class="k">Участники</span><span>${(e.attendees||[]).map(esc).join("<br>")||"—"}</span></div>
    ${e.error?`<div class="row"><span class="k">Ошибка</span><span style="color:#ff8a8a">${esc(e.error)}</span></div>`:""}
    <div class="actions">
      ${e.noteUrl?`<a href="${esc(e.noteUrl)}" target="_blank"><button class="primary">📄 Заметки на Drive</button></a>`:""}
      ${e.meetUrl?`<a href="${esc(e.meetUrl)}" target="_blank"><button>🎥 Открыть Meet</button></a>`:""}
      ${e.meetCode?`<button onclick="viewTranscript('${e.meetCode}')">📝 Транскрипт</button>`:""}
      ${e.meetCode?`<button onclick="resend('${e.meetCode}',this)">🤖 Переотправить бота</button>`:""}
      <button onclick="toggleSkip('${e.id}',this)">${e.manualSkip?'✅ Вернуть бота':'🚫 Бота не впускать'}</button>
    </div>
    <div id="trbox"></div>`;
  document.getElementById("ov").classList.add("open");
}
function closeDrawer(){document.getElementById("ov").classList.remove("open")}

async function viewTranscript(code){
  const box=document.getElementById("trbox");box.innerHTML='<div class="spin">загрузка транскрипта…</div>';
  const r=await fetch(`/api/transcript?code=${code}`);const d=await r.json();
  box.innerHTML=d.transcript?`<pre class="tr">${esc(d.transcript)}</pre>`:'<div class="spin" style="margin-top:8px">транскрипта нет</div>';
}
async function toggleSkip(id,btn){
  const e=cache.find(x=>x.id===id);if(!e)return;
  const on=!e.manualSkip;
  btn.disabled=true;btn.textContent="…";
  try{
    await fetch("/api/skip",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({eventId:e.id,nativeId:e.meetCode,code:e.meetCode,title:e.title,on})});
    await load();draw();openDrawer(id); // обновить статус + перерисовать панель
  }catch(err){btn.disabled=false;btn.textContent="ошибка"}
}
async function resend(code,btn){
  btn.disabled=true;btn.textContent="отправляю…";
  try{const r=await fetch("/api/redispatch",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code})});
    const d=await r.json();btn.textContent=d.ok?"✓ отправлен":"ошибка "+d.status;}
  catch(e){btn.textContent="ошибка"}
  setTimeout(()=>{btn.disabled=false;btn.textContent="🤖 Переотправить бота"},3000);
}

document.addEventListener("keydown",e=>{if(e.key==="Escape")closeDrawer()});
render();
setInterval(()=>{load().then(draw)},45000); // авто-обновление статусов
</script>
</body>
</html>
